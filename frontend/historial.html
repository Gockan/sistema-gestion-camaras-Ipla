<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Historial de Incidencias</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="contenedor">

    <h1>Historial de Incidencias</h1>

    <p id="usuarioActivo"></p>

    <h2>Filtros de búsqueda</h2>

    <select id="filtro_establecimiento_incidencia" onchange="aplicarFiltrosIncidencias()">
        <option value="">Todos los establecimientos</option>
    </select>

    <select id="filtro_estado_incidencia" onchange="aplicarFiltrosIncidencias()">
        <option value="">Todos los estados</option>
        <option value="Pendiente">Pendiente</option>
        <option value="En revisión">En revisión</option>
        <option value="Resuelto">Resuelto</option>
    </select>

    <label>
        Desde:
        <input type="date" id="filtro_fecha_desde" onchange="aplicarFiltrosIncidencias()">
    </label>

    <label>
        Hasta:
        <input type="date" id="filtro_fecha_hasta" onchange="aplicarFiltrosIncidencias()">
    </label>

    <button onclick="limpiarFiltrosIncidencias()">
        Limpiar filtros
    </button>

    <hr>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Sede</th>
                <th>Cámara / Ubicación</th>
                <th>Descripción</th>
                <th>Estado</th>
                <th>Reporte</th>
                <th>Fecha</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tabla-incidencias">
        </tbody>
    </table>

    <button onclick="window.location.href='dashboard.html'">
        Volver al menú principal
    </button>

</div>

<script>
    const usuario = localStorage.getItem('usuario');
    const rol = localStorage.getItem('rol');

    if (!rol) {
        window.location.href = 'login.html';
    }

    document.getElementById('usuarioActivo').innerText =
        'Usuario: ' + usuario + ' | Perfil: ' + rol;
</script>

<script src="js/app.js"></script>

<script>
    iniciarHistorialIncidencias();
</script>

</body>
</html>
