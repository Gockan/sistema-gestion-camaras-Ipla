<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Incidencia</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="dashboard">

    <h1>Registrar Incidencia</h1>

    <p id="usuarioActivo"></p>

    <input 
        type="text" 
        id="sede" 
        placeholder="Establecimiento / Sede"
    >

    <input 
        type="text" 
        id="ubicacion" 
        placeholder="Cámara / ubicación"
    >

    <textarea
        id="descripcion"
        placeholder="Detalle del problema detectado"
        rows="5"
    ></textarea>

    <br><br>

    <label>

        <input 
            type="checkbox"
            id="enviado_jefatura"
        >

        Generar reporte para jefatura

    </label>

    <br><br>

    <button onclick="registrarIncidencia()">
        Guardar incidencia
    </button>

    <button onclick="window.location.href='dashboard.html'">
        Volver
    </button>

</div>

<script>

const usuario=
localStorage.getItem(
'usuario'
);

const rol=
localStorage.getItem(
'rol'
);

if(rol!=="Operador"){

alert(
'Acceso restringido'
);

window.location.href=
'dashboard.html';

}

document.getElementById(
'usuarioActivo'
).innerText=
'Usuario: '+usuario;

</script>

<script src="js/app.js"></script>

</body>
</html>
