<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Incidencia</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="dashboard">

    <h1>Registrar Incidencia</h1>

    <p id="usuarioActivo"></p>

    <select id="establecimiento">
        <option value="">Seleccione establecimiento</option>
    </select>

    <select id="camara">
        <option value="">Seleccione cámara</option>
    </select>

    <select id="estado_camara">
        <option value="">Seleccione estado detectado</option>
        <option value="2">Con baja visibilidad</option>
        <option value="3">Fuera de servicio</option>
        <option value="4">Sucia</option>
        <option value="5">Sin señal</option>
    </select>

    <textarea
        id="descripcion"
        placeholder="Detalle del problema detectado"
        rows="5"
    ></textarea>

    <label>
        <input 
            type="checkbox"
            id="enviado_jefatura"
        >
        Generar reporte para jefatura
    </label>

    <button onclick="registrarIncidencia()">
        Guardar incidencia
    </button>

    <button onclick="window.location.href='dashboard.html'">
        Volver
    </button>

</div>

<script>
    const usuario = localStorage.getItem('usuario');
    const rol = localStorage.getItem('rol');

    if (rol !== "Operador") {
        alert('Acceso restringido');
        window.location.href = 'dashboard.html';
    }

    document.getElementById('usuarioActivo').innerText =
        'Usuario: ' + usuario;
</script>

<script src="js/app.js"></script>

<script>
    cargarEstablecimientos();
    cargarCamaras();
</script>

</body>
</html>
