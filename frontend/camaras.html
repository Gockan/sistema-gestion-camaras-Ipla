<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestión de Cámaras</title>

    <link rel="stylesheet" href="css/estilos.css">
</head>
<body>

<div class="contenedor">

    <h1>Gestión de Cámaras</h1>

    <p id="usuarioActivo"></p>

    <h2 id="tituloFormularioCamara">Registrar Cámara</h2>

    <input type="hidden" id="id_camara">

    <select id="id_establecimiento_camara">
        <option value="">Seleccione establecimiento</option>
    </select>

    <input
        type="text"
        id="codigo_camara"
        placeholder="Código de cámara. Ejemplo: CAM-001"
    >

    <input
        type="text"
        id="ubicacion_camara"
        placeholder="Ubicación de la cámara. Ejemplo: Entrada principal"
    >

    <select id="estado_camara_gestion">
        <option value="">Seleccione estado</option>
        <option value="Operativa">Operativa</option>
        <option value="Con baja visibilidad">Con baja visibilidad</option>
        <option value="Fuera de servicio">Fuera de servicio</option>
        <option value="Sucia">Sucia</option>
        <option value="Sin señal">Sin señal</option>
    </select>

    <button onclick="guardarCamara()">
        Guardar cámara
    </button>

    <button onclick="limpiarFormularioCamara()">
        Limpiar
    </button>

    <hr>

    <h2>Listado de Cámaras</h2>

    <table>
        <thead>
            <tr>
                <th>ID</th>
                <th>Establecimiento</th>
                <th>Código</th>
                <th>Ubicación</th>
                <th>Estado</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody id="tabla-camaras">
        </tbody>
    </table>

    <button onclick="window.location.href='dashboard.html'">
        Volver
    </button>

</div>

<script>
    const usuario = localStorage.getItem('usuario');
    const rol = localStorage.getItem('rol');

    if (!usuario || !rol) {
        window.location.href = 'login.html';
    }

    if (rol !== 'Operador' && rol !== 'Administrador') {
        alert('Acceso restringido');
        window.location.href = 'dashboard.html';
    }

    document.getElementById('usuarioActivo').innerText =
        'Usuario: ' + usuario + ' | Perfil: ' + rol;
</script>

<script src="js/app.js"></script>

<script>
    iniciarFormularioCamara();
</script>

</body>
</html>
